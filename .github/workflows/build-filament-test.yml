name: build-filament-test

# One-off TEST image builder for intarweb/filament-manager — builds an ARBITRARY
# branch AS-IS to a throwaway GHCR tag. Does NOT touch :latest, does NOT fold open
# PRs, does NOT bump the manifest version. For probe/experiment images that Frigg
# deploys to observe live values. The deploy image is build-filament-manager.yml.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "branch on intarweb/filament-manager to build"
        required: true
      tag:
        description: "GHCR tag to publish (e.g. probe-rfid) — NOT latest"
        required: true

permissions:
  packages: write
  contents: read

concurrency:
  group: build-filament-test
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/intarweb/filament-manager
  ADDON_DIR: filament_manager

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Guard — refuse to clobber protected tags
        run: |
          case "${{ github.event.inputs.tag }}" in
            latest|0.39.*|sha-*) echo "::error::refusing to publish protected tag '${{ github.event.inputs.tag }}' from the test builder"; exit 1;;
          esac
          echo "tag ok: ${{ github.event.inputs.tag }}"

      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          repository: intarweb/filament-manager
          ref: ${{ github.event.inputs.branch }}
          path: fork

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push test image
        uses: docker/build-push-action@v6
        with:
          context: fork/${{ env.ADDON_DIR }}
          file: fork/${{ env.ADDON_DIR }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ env.IMAGE }}:${{ github.event.inputs.tag }}

      - name: Summary
        run: echo "Built \`${{ env.IMAGE }}:${{ github.event.inputs.tag }}\` from branch \`${{ github.event.inputs.branch }}\` (test image — not :latest)." >> "$GITHUB_STEP_SUMMARY"
